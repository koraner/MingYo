                <div className="bg-slate-50 p-4 rounded-lg border border-slate-100">
                  <h4 className="font-bold text-slate-900 mb-2">Excel 高度相容</h4>
                  <p className="text-sm text-slate-600">一鍵複製 TSV 格式，可直接貼上至 Excel、Google Sheets。</p>
                </div>
              </div>
            </section>

            <section>
              <h3 className="text-xl font-bold text-slate-900 border-b pb-2 mb-4">🛠️ 操作指南</h3>
              <ol className="list-decimal pl-5 space-y-3 text-slate-700">
                <li><strong>輸入圖片：</strong>使用快捷鍵直接貼上截圖，或點擊上傳按鈕。</li>
                <li><strong>選取區域：</strong>圖片出現後，使用滑鼠拖曳框選出您想要辨識的數字範圍 (排除雜訊)。</li>
                <li><strong>確認辨識：</strong>點擊「立即辨識」，AI 將自動解析。</li>
                <li><strong>複製數據：</strong>辨識結果顯示於右側，點擊「複製表格」即可貼往您的工作軟體。</li>
              </ol>
            </section>
          </div>
        )
      }
    ];

    // ==============================================
    // 2. 詳細資訊彈窗組件 (Modal)
    // ==============================================
    const ProjectModal = ({ project, onClose }) => {
      if (!project) return null;

      // 點擊背景關閉
      const handleBackdropClick = (e) => {
        if (e.target === e.currentTarget) onClose();
      };

      return (
        <div 
          className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm animate-fade-in"
          onClick={handleBackdropClick}
        >
          <div className="bg-white rounded-2xl shadow-2xl w-full max-w-4xl max-h-[90vh] flex flex-col overflow-hidden animate-scale-in">
            {/* Modal Header */}
            <div className="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50">
              <h2 className="text-xl sm:text-2xl font-bold text-slate-800 flex items-center gap-3">
                <span className="p-2 bg-white rounded-lg shadow-sm text-blue-600 border border-slate-100">
                  {project.icon}
                </span>
                {project.title}
              </h2>
              <button 
                onClick={onClose} 
                className="p-2 hover:bg-slate-200 rounded-full transition-colors text-slate-500 shrink-0"
              >
                <XIcon size={24} />
              </button>
            </div>

            {/* Modal Body (Scrollable) */}
            <div className="p-6 sm:p-8 overflow-y-auto custom-scroller flex-1">
              {project.details}
            </div>

            {/* Modal Footer */}
            <div className="p-5 border-t border-slate-100 bg-slate-50 flex justify-end gap-3 shrink-0">
              <button 
                onClick={onClose}
                className="px-6 py-2.5 rounded-xl text-slate-600 font-bold hover:bg-slate-200 transition-colors"
              >
                關閉
              </button>
              <a 
                href={project.url} 
                target="_blank" 
                rel="noopener noreferrer" 
                className="px-6 py-2.5 bg-blue-600 text-white rounded-xl hover:bg-blue-700 font-bold transition-colors flex items-center gap-2 shadow-lg shadow-blue-200"
              >
                前往使用 <ExternalLink className="w-4 h-4" />
              </a>
            </div>
          </div>
        </div>
      );
    };

    // ==============================================
    // 3. 主網站組件
    // ==============================================
    function PortfolioHub() {
      const [selectedProject, setSelectedProject] = useState(null);

      // 防止 Modal 開啟時背景捲動
      useEffect(() => {
        if (selectedProject) {
          document.body.style.overflow = 'hidden';
        } else {
          document.body.style.overflow = 'auto';
        }
        return () => { document.body.style.overflow = 'auto'; };
      }, [selectedProject]);

      return (
        <div className="min-h-screen bg-slate-50 text-slate-800 font-sans">
          {/* 頂部導覽列 */}
          <header className="bg-white border-b border-slate-200 sticky top-0 z-40 bg-white/80 backdrop-blur-md">
            <div className="max-w-5xl mx-auto px-6 h-16 flex justify-between items-center">
              <div className="flex items-center gap-2 text-xl font-bold text-slate-900 cursor-pointer hover:text-blue-600 transition" onClick={() => window.scrollTo({top:0, behavior:'smooth'})}>
                <Briefcase className="w-6 h-6 text-blue-600" />
                <span>My Portfolio Hub</span>
              </div>
              <div className="text-sm font-medium text-slate-500">
                我的數位收藏
              </div>
            </div>
          </header>

          {/* 主要內容區 */}
          <main className="max-w-5xl mx-auto px-6 py-12 min-h-[80vh]">
            <div className="space-y-12 animate-fade-in">
              {/* 簡介區塊 */}
              <section className="text-center space-y-4 max-w-2xl mx-auto mt-8">
                <div className="inline-flex items-center justify-center p-3 bg-blue-50 text-blue-600 rounded-full mb-2 ring-1 ring-blue-100">
                  <Star className="w-6 h-6 fill-blue-600" />
                </div>
                <h1 className="text-4xl font-extrabold text-slate-900 tracking-tight">
                  精選專案連結
                </h1>
                <p className="text-lg text-slate-600 leading-relaxed">
                  這裡彙整了我與 AI 協作開發的各項成果。點擊卡片可查看詳細說明或直接前往使用。
                </p>
              </section>

              {/* 專案列表網格 */}
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                {projectsData.map((project) => (
                  <div 
                    key={project.id}
                    className="group flex flex-col bg-white rounded-2xl border border-slate-200 shadow-sm hover:shadow-xl hover:-translate-y-1 transition-all duration-300 overflow-hidden"
                  >
                    <div className="p-6 flex-1 flex flex-col">
                      <div className="flex items-start justify-between mb-4">
                        <div className="w-14 h-14 bg-slate-50 text-slate-700 rounded-2xl flex items-center justify-center group-hover:bg-blue-600 group-hover:text-white transition-colors duration-300 shadow-inner">
                          {project.icon}
                        </div>
                      </div>
                      
                      <h3 className="text-lg font-bold text-slate-900 mb-3 group-hover:text-blue-600 transition-colors">
                        {project.title}
                      </h3>
                      <p className="text-slate-600 text-sm leading-relaxed mb-6 flex-1 text-justify line-clamp-3">
                        {project.description}
                      </p>
                      
                      <div className="flex gap-2 mt-auto">
                        <button 
                          onClick={() => setSelectedProject(project)}
                          className="flex-1 py-2.5 px-4 rounded-xl border border-slate-200 text-slate-600 font-bold hover:bg-slate-50 hover:text-slate-900 transition-colors text-sm flex items-center justify-center gap-2"
                        >
                          <InfoIcon className="w-4 h-4" /> 詳細介紹
                        </button>
                        <a 
                          href={project.url}
                          target="_blank"
                          rel="noopener noreferrer"
                          className="flex-1 py-2.5 px-4 rounded-xl bg-blue-50 text-blue-600 font-bold hover:bg-blue-600 hover:text-white transition-all text-sm flex items-center justify-center gap-2"
                        >
                          前往使用 <ArrowRight className="w-4 h-4" />
                        </a>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </main>

          {/* 頁尾 */}
          <footer className="bg-white border-t border-slate-200 py-8 text-center text-slate-500 text-sm">
            <p>&copy; {new Date().getFullYear()} My Portfolio. Built with React & Tailwind CSS.</p>
          </footer>

          {/* 彈出視窗 */}
          <ProjectModal 
            project={selectedProject} 
            onClose={() => setSelectedProject(null)} 
          />
        </div>
      );
    }

    // 啟動 React 應用
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<PortfolioHub />);
  </script>
</body>
</html>
